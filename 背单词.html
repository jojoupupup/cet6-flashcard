<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="六级背单词">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#6c63ff">
<meta name="application-name" content="六级背单词">
<meta name="description" content="基于艾宾浩斯记忆曲线的CET-6六级高频词背诵应用">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<title>六级词汇 · 艓宾浩斯记忆</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d2e;
    --card2: #222540;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #00d4aa;
    --red: #ff6b6b;
    --yellow: #ffd166;
    --text: #e8eaf6;
    --text2: #9095b4;
    --border: #2d3155;
    --shadow: 0 8px 32px rgba(108,99,255,0.15);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { 
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "PingFang SC", "SF Pro Display", "Microsoft YaHei", sans-serif;
    min-height: 100vh; min-height: 100dvh;
    overflow-x: hidden;
    touch-action: pan-y;
  }
  body {
    display: flex; flex-direction: column;
  }

  /* ===== PWA INSTALL BANNER ===== */
  .pwa-banner {
    display: none;
    background: linear-gradient(135deg, var(--accent), #4a42d1);
    color: #fff; padding: 12px 16px;
    align-items: center; justify-content: space-between;
    font-size: 14px; font-weight: 600;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .pwa-banner.show { display: flex; }
  .pwa-banner-text { flex: 1; }
  .pwa-install-btn {
    background: #fff; color: var(--accent);
    padding: 8px 18px; border-radius: 99px;
    font-size: 13px; font-weight: 700; border: none;
    cursor: pointer; white-space: nowrap;
  }

  /* ===== TOP BAR ===== */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .topbar .logo { font-size: 17px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .topbar .stats { display: flex; gap: 16px; }
  .stat-item { text-align: center; }
  .stat-val { font-size: 18px; font-weight: 700; color: var(--text); }
  .stat-lbl { font-size: 10px; color: var(--text2); }

  /* ===== PROGRESS BAR ===== */
  .progress-wrap {
    padding: 8px 16px 0; background: var(--card);
  }
  .progress-bar-bg {
    height: 4px; border-radius: 99px;
    background: var(--border); overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--green));
    transition: width 0.4s ease;
  }
  .progress-text {
    font-size: 11px; color: var(--text2);
    text-align: right; padding: 3px 0 6px;
  }

  /* ===== MAIN ===== */
  main {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 16px 16px 120px;
  }

  /* ===== CARD with SWIPE ===== */
  .swipe-container {
    width: 100%; max-width: 520px;
    position: relative;
    touch-action: pan-y;
    overflow: hidden;
  }
  .word-card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 24px 20px;
    box-shadow: var(--shadow);
    position: relative;
    animation: slideIn .35s ease;
    transition: transform 0.15s ease, opacity 0.15s ease;
    will-change: transform, opacity;
  }
  .word-card.swiping {
    transition: none;
  }
  .word-card.swipe-right {
    transform: translateX(120vw) rotate(15deg);
    opacity: 0;
    transition: transform 0.4s ease, opacity 0.3s ease;
  }
  .word-card.swipe-left {
    transform: translateX(-120vw) rotate(-15deg);
    opacity: 0;
    transition: transform 0.4s ease, opacity 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity:0; transform: translateY(20px) scale(0.95); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  /* Swipe overlay hints */
  .swipe-hint-right {
    position: absolute; top: 16px; right: 16px;
    background: rgba(0,212,170,0.25); color: var(--green);
    padding: 6px 14px; border-radius: 8px;
    font-size: 14px; font-weight: 700;
    opacity: 0; transition: opacity 0.1s;
    border: 2px solid rgba(0,212,170,0.4);
    pointer-events: none;
  }
  .swipe-hint-left {
    position: absolute; top: 16px; left: 16px;
    background: rgba(255,107,107,0.25); color: var(--red);
    padding: 6px 14px; border-radius: 8px;
    font-size: 14px; font-weight: 700;
    opacity: 0; transition: opacity 0.1s;
    border: 2px solid rgba(255,107,107,0.4);
    pointer-events: none;
  }

  .card-tag {
    position: absolute; top: 14px; right: 14px;
    font-size: 11px; padding: 3px 10px; border-radius: 99px;
    font-weight: 600; letter-spacing: 0.5px;
  }
  .tag-new    { background: rgba(108,99,255,0.2); color: var(--accent); }
  .tag-review { background: rgba(255,209,102,0.2); color: var(--yellow); }
  .tag-master { background: rgba(0,212,170,0.2); color: var(--green); }

  .word-num { font-size: 12px; color: var(--text2); margin-bottom: 4px; }

  .word-main {
    font-size: 38px; font-weight: 800;
    color: var(--text); letter-spacing: -1px;
    margin-bottom: 4px; line-height: 1.1;
  }
  .word-phonetic {
    font-size: 15px; color: var(--accent);
    font-style: italic; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .speaker-btn {
    cursor: pointer; background: rgba(108,99,255,0.15);
    border: none; border-radius: 50%;
    width: 30px; height: 30px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--accent); font-size: 14px;
    transition: background .2s;
    -webkit-user-select: none;
  }
  .speaker-btn:active { background: rgba(108,99,255,0.4); transform: scale(0.92); }

  .divider { height: 1px; background: var(--border); margin: 14px 0; }

  .meanings-list { margin-bottom: 14px; }
  .meaning-row {
    display: flex; gap: 10px; align-items: flex-start;
    margin-bottom: 6px;
  }
  .pos-tag {
    font-size: 11px; padding: 2px 7px; border-radius: 4px;
    font-weight: 600; min-width: 32px; text-align: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .pos-n  { background: rgba(0,212,170,0.15); color: var(--green); }
  .pos-v  { background: rgba(255,101,132,0.15); color: var(--accent2); }
  .pos-adj{ background: rgba(255,209,102,0.15); color: var(--yellow); }
  .pos-adv{ background: rgba(108,99,255,0.15); color: var(--accent); }
  .pos-other{ background: rgba(150,150,150,0.15); color: #aaa; }
  .meaning-cn { font-size: 16px; color: var(--text); line-height: 1.5; }

  .examples-section { margin-top: 6px; }
  .example-title {
    font-size: 12px; color: var(--text2); letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .example-title::before {
    content:''; display:block; width:3px; height:12px;
    background: var(--accent); border-radius: 2px;
  }
  .example-card {
    background: var(--card2);
    border-radius: 10px; padding: 10px 12px;
    border-left: 3px solid var(--accent);
  }
  .example-en {
    font-size: 14px; color: var(--text);
    line-height: 1.6; margin-bottom: 3px;
  }
  .example-en .highlight {
    color: var(--accent); font-weight: 700;
    text-decoration: underline; text-decoration-color: rgba(108,99,255,.4);
  }
  .example-cn { font-size: 13px; color: var(--text2); line-height: 1.5; }

  /* ===== MEMORY DOTS ===== */
  .memory-dots {
    display: flex; gap: 6px; margin: 14px 0 0;
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--border); transition: all .3s;
  }
  .dot.filled { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  /* ===== EBBINGHAUS ===== */
  .ebbinghaus-info {
    margin-top: 10px;
    font-size: 12px; color: var(--text2);
    display: flex; align-items: center; gap: 6px;
  }
  .ebbinghaus-badge {
    background: rgba(255,209,102,0.15); color: var(--yellow);
    border-radius: 99px; padding: 2px 8px; font-size: 11px;
    font-weight: 600;
  }

  /* ===== ACTION BUTTONS ===== */
  .action-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 16px calc(16px + var(--safe-bottom));
    background: linear-gradient(to top, var(--bg) 70%, transparent);
    display: flex; gap: 12px; justify-content: center;
    z-index: 50;
  }
  .btn {
    flex: 1; max-width: 200px;
    padding: 14px 0; border-radius: 14px;
    font-size: 15px; font-weight: 700;
    border: none; cursor: pointer;
    transition: all .15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    -webkit-user-select: none;
  }
  .btn:active { transform: scale(0.94); }

  .btn-know {
    background: linear-gradient(135deg, #00d4aa, #00b48a);
    color: #fff;
    box-shadow: 0 4px 16px rgba(0,212,170,0.3);
  }
  .btn-unknown {
    background: linear-gradient(135deg, #ff6b6b, #e84d4d);
    color: #fff;
    box-shadow: 0 4px 16px rgba(255,107,107,0.3);
  }

  /* ===== CONGRATS ===== */
  .congrats-screen {
    display: none;
    flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 40px 20px; gap: 16px; flex: 1;
  }
  .congrats-screen.show { display: flex; }
  .congrats-emoji { font-size: 64px; }
  .congrats-title { font-size: 24px; font-weight: 800; }
  .congrats-sub { font-size: 15px; color: var(--text2); line-height: 1.7; }
  .restart-btn {
    margin-top: 12px;
    padding: 12px 36px; border-radius: 14px;
    background: var(--accent); color: #fff;
    font-size: 15px; font-weight: 700; border: none; cursor: pointer;
    box-shadow: 0 4px 16px rgba(108,99,255,0.4);
  }
  .restart-btn:active { transform: scale(0.94); }

  /* ===== TABS / OVERVIEW ===== */
  .tabs {
    display: flex; gap: 0;
    background: var(--card); padding: 0 16px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 16px; font-size: 14px; cursor: pointer;
    color: var(--text2); border-bottom: 2px solid transparent;
    transition: all .2s; font-weight: 500;
    -webkit-user-select: none;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* ===== OVERVIEW PANEL ===== */
  .overview-wrap {
    max-width: 520px; margin: 0 auto; padding: 16px 16px 120px;
  }
  .overview-cards {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; margin-bottom: 16px;
  }
  .ov-card {
    background: var(--card); border-radius: 14px;
    padding: 14px 10px; text-align: center;
    border: 1px solid var(--border);
  }
  .ov-val { font-size: 26px; font-weight: 800; }
  .ov-lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .ov-val.green { color: var(--green); }
  .ov-val.yellow { color: var(--yellow); }
  .ov-val.red { color: var(--red); }

  .section-title {
    font-size: 13px; color: var(--text2); letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 10px;
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }

  .review-schedule { margin-bottom: 20px; }
  .schedule-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; background: var(--card);
    border-radius: 10px; margin-bottom: 6px;
    border: 1px solid var(--border);
  }
  .schedule-day { font-weight: 600; font-size: 14px; }
  .schedule-count {
    background: rgba(108,99,255,0.2); color: var(--accent);
    padding: 3px 10px; border-radius: 99px; font-size: 13px; font-weight: 600;
  }

  .mastered-list {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .mastered-tag {
    background: rgba(0,212,170,0.1); color: var(--green);
    border: 1px solid rgba(0,212,170,0.25);
    border-radius: 8px; padding: 4px 10px;
    font-size: 13px;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; top: 72px; left: 50%; transform: translateX(-50%);
    background: var(--card2); color: var(--text);
    padding: 10px 20px; border-radius: 99px;
    font-size: 14px; font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
    z-index: 999;
    max-width: 90vw; text-align: center;
  }
  .toast.show { opacity: 1; }

  /* ===== SWIPE INSTRUCTION ===== */
  .swipe-instruction {
    font-size: 11px; color: var(--text2); text-align: center;
    margin-top: 10px;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    opacity: 0.7;
  }

  /* ===== HAPTIC FEEDBACK ===== */
  @keyframes hapticKnow {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(0.95); }
  }
  @keyframes hapticUnknown {
    0%, 100% { transform: scale(1); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  /* ===== STREAK DISPLAY ===== */
  .streak-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px; background: var(--card);
    margin-top: 4px;
  }
  .streak-fire { font-size: 18px; }
  .streak-text { font-size: 13px; color: var(--text2); }
  .streak-num { font-size: 16px; font-weight: 700; color: var(--yellow); }
</style>
</head>

<script>
// ===================== PWA =====================
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('pwaBanner').classList.add('show');
});

function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(choice => {
      if (choice.outcome === 'accepted') {
        showToast('✅ 已安装到桌面！');
      }
      deferredPrompt = null;
      dismissBanner();
    });
  }
}

function dismissBanner() {
  document.getElementById('pwaBanner').classList.remove('show');
}

// Register Service Worker (only works on HTTP, not file://)
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    console.log('[PWA] Service Worker registered', reg.scope);
  }).catch(err => {
    console.log('[PWA] SW registration failed', err);
  });
} else {
  console.log('[PWA] Skipping SW registration (file:// protocol or no SW support)');
}

// ===================== WORD DATA =====================
const WORDS_RAW = [

// ===================== HELPERS =====================
function getPhonetic(word) {
  return PHONETICS[word.toLowerCase()] || "/ " + word + " /";
}
function getExample(word) {
  const w = word.toLowerCase();
  if (EXAMPLES[w]) return EXAMPLES[w];
  return {
    en: `The word "<b>${word}</b>" is commonly used in academic and daily contexts.`,
    cn: `"${word}" 在学术和日常语境中广泛使用。`
  };
}

function parseMeanings(meaning) {
  const parts = meaning.split(/[；;]/).map(s => s.trim()).filter(Boolean);
  return parts.map(p => {
    let pos = 'other', posLabel = '词';
    if (/的$|的\b/.test(p)) { pos = 'adj'; posLabel = 'adj.'; }
    else if (/地$/.test(p)) { pos = 'adv'; posLabel = 'adv.'; }
    else if (/化$/.test(p)) { pos = 'v'; posLabel = 'v.'; }
    else if (/[力法学式]$/.test(p)) { pos = 'n'; posLabel = 'n.'; }
    else if (/[跑走说讲做使令叫让吃喝看听写打骂拿给取带放收传出进来去]/.test(p.charAt(0))) { pos = 'v'; posLabel = 'v.'; }
    else if (/[；,，]/.test(meaning) && p.length < 6) { pos = 'other'; posLabel = '释'; }
    return { text: p, pos, posLabel };
  });
}

const STORE_KEY = 'cet6_flashcard_v3';

function loadData() {
  try { const d = localStorage.getItem(STORE_KEY); return d ? JSON.parse(d) : null; }
  catch(e) { return null; }
}

// ===================== STATE =====================
let state = {
  words: [],
  sessionQueue: [],
  sessionIdx: 0,
  todayLearned: 0,
  sessionDate: null,
  streakDays: 0,
  lastStudyDate: null
};

const EBBINGHAUS = [0, 1, 2, 4, 7, 15, 30];

function initState() {
  const saved = loadData();
  const today = new Date().toDateString();

  if (saved && saved.words && saved.words.length === WORDS_RAW.length) {
    state.words = saved.words;
    state.todayLearned = (saved.sessionDate === today) ? (saved.todayLearned || 0) : 0;
    state.streakDays = saved.streakDays || 0;
    state.lastStudyDate = saved.lastStudyDate || null;
  } else {
    state.words = WORDS_RAW.map(w => ({
      word: w.word, meaning: w.meaning,
      mastered: false, knownCount: 0, reviewCount: 0,
      nextReview: null, lastSeen: null, firstSeen: null
    }));
    state.todayLearned = 0;
    state.streakDays = 0;
    state.lastStudyDate = null;
  }
  state.sessionDate = today;

  // Calculate streak
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (state.lastStudyDate === today || state.lastStudyDate === yesterday) {
    // streak preserved
  } else if (state.lastStudyDate) {
    state.streakDays = 0; // streak broken
  }

  buildQueue();
}

function buildQueue() {
  const now = Date.now();
  const dueReview = [], learning = [], newWords = [];

  state.words.forEach((w, i) => {
    if (w.mastered) return;
    if (w.nextReview && w.nextReview <= now) dueReview.push(i);
    else if (w.nextReview && w.nextReview > now) learning.push(i);
    else if (!w.firstSeen) newWords.push(i);
    else if (w.knownCount < 3) learning.push(i);
  });

  const NEW_PER_SESSION = 20;
  const toShow = [
    ...dueReview,
    ...newWords.slice(0, Math.max(NEW_PER_SESSION - dueReview.length, 0))
  ];
  if (toShow.length < 5) toShow.push(...learning.slice(0, 10));

  state.sessionQueue = shuffle(toShow);
  state.sessionIdx = 0;

  if (state.sessionQueue.length === 0) {
    state.sessionQueue = shuffle(learning.slice(0, 20));
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===================== SWIPE HANDLING =====================
let touchStartX = 0, touchStartY = 0, isSwiping = false;
const SWIPE_THRESHOLD = 80;

function handleTouchStart(e) {
  const card = document.querySelector('.word-card');
  if (!card) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  isSwiping = false;
  card.classList.add('swiping');
}

function handleTouchMove(e) {
  const card = document.querySelector('.word-card');
  if (!card) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;

  // If horizontal swipe is dominant
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 15) {
    isSwiping = true;
    e.preventDefault(); // prevent vertical scroll during swipe

    // Move card with touch
    const rotation = dx * 0.05;
    const opacity = 1 - Math.abs(dx) / 400;
    card.style.transform = `translateX(${dx}px) rotate(${rotation}deg)`;
    card.style.opacity = Math.max(opacity, 0.5);

    // Show hint overlays
    const hintR = card.querySelector('.swipe-hint-right');
    const hintL = card.querySelector('.swipe-hint-left');
    if (dx > 30) {
      if (hintR) hintR.style.opacity = Math.min(dx / SWIPE_THRESHOLD, 1);
      if (hintL) hintL.style.opacity = 0;
    } else if (dx < -30) {
      if (hintL) hintL.style.opacity = Math.min(-dx / SWIPE_THRESHOLD, 1);
      if (hintR) hintR.style.opacity = 0;
    } else {
      if (hintR) hintR.style.opacity = 0;
      if (hintL) hintL.style.opacity = 0;
    }
  }
}

function handleTouchEnd(e) {
  const card = document.querySelector('.word-card');
  if (!card) return;
  card.classList.remove('swiping');

  if (!isSwiping) {
    card.style.transform = '';
    card.style.opacity = '';
    return;
  }

  const dx = e.changedTouches[0].clientX - touchStartX;

  // Reset hint overlays
  const hintR = card.querySelector('.swipe-hint-right');
  const hintL = card.querySelector('.swipe-hint-left');
  if (hintR) hintR.style.opacity = 0;
  if (hintL) hintL.style.opacity = 0;

  if (dx > SWIPE_THRESHOLD) {
    // Swiped right = 学会了
    card.classList.add('swipe-right');
    setTimeout(() => { markWord(true); card.classList.remove('swipe-right'); card.style.transform = ''; card.style.opacity = ''; }, 400);
  } else if (dx < -SWIPE_THRESHOLD) {
    // Swiped left = 还不会
    card.classList.add('swipe-left');
    setTimeout(() => { markWord(false); card.classList.remove('swipe-left'); card.style.transform = ''; card.style.opacity = ''; }, 400);
  } else {
    // Not enough swipe, snap back
    card.style.transform = '';
    card.style.opacity = '';
  }
}

// Attach swipe listeners
const swipeContainer = document.getElementById('swipeContainer');
swipeContainer.addEventListener('touchstart', handleTouchStart, { passive: true });
swipeContainer.addEventListener('touchmove', handleTouchMove, { passive: false });
swipeContainer.addEventListener('touchend', handleTouchEnd, { passive: true });

// ===================== CARD RENDER =====================
function getCurrentWord() {
  if (state.sessionIdx >= state.sessionQueue.length) return null;
  return state.words[state.sessionQueue[state.sessionIdx]];
}

function renderCard() {
  const wrap = document.getElementById('wordCardWrap');
  const actionBar = document.getElementById('actionBar');
  const congratsScreen = document.getElementById('congratsScreen');
  const w = getCurrentWord();

  if (!w) {
    wrap.innerHTML = '';
    actionBar.style.display = 'none';
    congratsScreen.classList.add('show');
    const mastered = state.words.filter(x => x.mastered).length;
    const learning = state.words.filter(x => !x.mastered && x.firstSeen).length;
    document.getElementById('congratsSub').innerHTML =
      `今天学习了 <b style="color:var(--accent)">${state.todayLearned}</b> 个单词<br>` +
      `已完全掌握 <b style="color:var(--green)">${mastered}</b> 个，学习中 <b style="color:var(--yellow)">${learning}</b> 个<br><br>
      💡 明天记得继续复习哦！艾宾浩斯记忆曲线会帮你巩固记忆`;
    updateStats();
    updateOverview();
    return;
  }

  congratsScreen.classList.remove('show');
  actionBar.style.display = 'flex';

  const phonetic = getPhonetic(w.word);
  const example = getExample(w.word);
  const meanings = parseMeanings(w.meaning);
  const dots = [0,1,2].map(i => `<div class="dot${i < w.knownCount ? ' filled' : ''}"></div>`).join('');

  let tagClass = 'tag-new', tagText = '新词';
  if (w.firstSeen) { tagClass = 'tag-review'; tagText = w.knownCount >= 2 ? '复习中' : '学习中'; }
  if (w.mastered) { tagClass = 'tag-master'; tagText = '已掌握'; }

  let ebInfo = '';
  if (w.reviewCount > 0) {
    const cycleDay = EBBINGHAUS[Math.min(w.reviewCount, EBBINGHAUS.length-1)];
    ebInfo = `<div class="ebbinghaus-info">🧠 艓宾浩斯 <span class="ebbinghaus-badge">第${w.reviewCount}次复习</span> 间隔 ${cycleDay} 天</div>`;
  }

  const posColors = {adj:'pos-adj', v:'pos-v', n:'pos-n', adv:'pos-adv', other:'pos-other'};
  const posLabels = {adj:'形容词', v:'动词', n:'名词', adv:'副词', other:'释义'};
  const meaningHtml = meanings.map(m =>
    `<div class="meaning-row">
      <span class="pos-tag ${posColors[m.pos] || 'pos-other'}">${posLabels[m.pos] || '释义'}</span>
      <span class="meaning-cn">${m.text}</span>
    </div>`
  ).join('');

  const exEn = example.en.replace(new RegExp(`\\b${w.word}\\b`, 'gi'), m => `<span class="highlight">${m}</span>`);
  const total = state.sessionQueue.length;
  const current = state.sessionIdx + 1;
  const pct = Math.round((current / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${current} / ${total}`;

  wrap.innerHTML = `
    <div class="word-card">
      <div class="swipe-hint-right">✅ 学会了</div>
      <div class="swipe-hint-left">😅 还不会</div>
      <span class="card-tag ${tagClass}">${tagText}</span>
      <div class="word-num">#${state.words.indexOf(w) + 1} · 六级高频词</div>
      <div class="word-main">${w.word}</div>
      <div class="word-phonetic">
        <span>${phonetic}</span>
        <button class="speaker-btn" onclick="speak('${w.word}')">🔊</button>
      </div>
      <div class="divider"></div>
      <div class="meanings-list">${meaningHtml}</div>
      <div class="examples-section">
        <div class="example-title">例句</div>
        <div class="example-card">
          <div class="example-en">${exEn}</div>
          <div class="example-cn">${example.cn}</div>
        </div>
      </div>
      <div class="memory-dots">${dots}</div>
      ${ebInfo}
    </div>
    <div class="swipe-instruction">👆 右滑 = 学会了 | 左滑 = 还不会</div>
  `;

  updateStats();
}

// ===================== SPEECH =====================
function speak(word) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(word);
    utt.lang = 'en-US';
    utt.rate = 0.85;
    window.speechSynthesis.speak(utt);
  }
  // Haptic feedback
  if (navigator.vibrate) navigator.vibrate(30);
}

// ===================== MARK WORD =====================
function markWord(known) {
  const w = getCurrentWord();
  if (!w) return;
  const now = Date.now();

  if (!w.firstSeen) {
    w.firstSeen = now;
    state.todayLearned++;
  }
  w.lastSeen = now;

  // Update streak
  const todayStr = new Date().toDateString();
  if (state.lastStudyDate !== todayStr) {
    const yesterdayStr = new Date(Date.now() - 86400000).toDateString();
    if (state.lastStudyDate === yesterdayStr) {
      state.streakDays++;
    } else {
      state.streakDays = 1;
    }
    state.lastStudyDate = todayStr;
  }

  if (known) {
    w.knownCount = Math.min(w.knownCount + 1, 3);
    if (w.knownCount >= 3) {
      w.mastered = true;
      w.reviewCount++;
      w.nextReview = null;
      showToast('🎉 完全掌握！');
      if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
    } else {
      w.reviewCount++;
      const intervalDays = EBBINGHAUS[Math.min(w.reviewCount, EBBINGHAUS.length - 1)];
      w.nextReview = intervalDays === 0 ? now + 2*3600000 : now + intervalDays*86400000;
      showToast(`✅ 再学 ${3 - w.knownCount} 次即可掌握`);
      if (navigator.vibrate) navigator.vibrate(30);
    }
  } else {
    w.knownCount = Math.max(0, w.knownCount - 1);
    w.nextReview = now + 5*60000;
    showToast('📝 稍后再复习');
    if (navigator.vibrate) navigator.vibrate([20, 10, 20]);
    state.sessionQueue.splice(
      Math.min(state.sessionIdx + 3, state.sessionQueue.length),
      0, state.sessionQueue[state.sessionIdx]
    );
  }

  state.sessionIdx++;
  saveData({
    words: state.words,
    sessionDate: state.sessionDate,
    todayLearned: state.todayLearned,
    streakDays: state.streakDays,
    lastStudyDate: state.lastStudyDate
  });
  renderCard();
}

// ===================== TOAST =====================
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ===================== STATS =====================
function updateStats() {
  const mastered = state.words.filter(w => w.mastered).length;
  document.getElementById('statMastered').textContent = mastered;
  document.getElementById('statToday').textContent = state.todayLearned;
  document.getElementById('streakNum').textContent = state.streakDays;
}

// ===================== TABS =====================
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'overview') updateOverview();
}

// ===================== OVERVIEW =====================
function updateOverview() {
  const mastered = state.words.filter(w => w.mastered).length;
  const learning = state.words.filter(w => !w.mastered && w.firstSeen).length;
  const newW = state.words.filter(w => !w.firstSeen).length;

  document.getElementById('ovMastered').textContent = mastered;
  document.getElementById('ovLearning').textContent = learning;
  document.getElementById('ovNew').textContent = newW;

  const now = Date.now(), oneDay = 86400000;
  const schedule = [0,1,2,3,7].map(d => {
    const start = now + d * oneDay, end = start + oneDay;
    const count = state.words.filter(w =>
      !w.mastered && w.nextReview && w.nextReview >= start && w.nextReview < end
    ).length;
    const labels = ['今天','明天','后天','第3天','第7天'];
    return { label: labels[d] || `第${d}天`, count };
  });

  document.getElementById('scheduleList').innerHTML = schedule.map(s =>
    `<div class="schedule-item">
      <span class="schedule-day">📅 ${s.label}</span>
      <span class="schedule-count">${s.count} 个单词</span>
    </div>`
  ).join('') + `<div style="font-size:12px;color:var(--text2);margin-top:8px;line-height:1.7">
    ⏰ 基于艾宾浩斯记忆曲线：学完后1天、2天、4天、7天、15天、30天各复习一次
  </div>`;

  const ml = document.getElementById('masteredList');
  const masteredWords = state.words.filter(w => w.mastered);
  ml.innerHTML = masteredWords.length === 0
    ? '<div style="color:var(--text2);font-size:14px">还没有完全掌握的单词，继续加油！💪</div>'
    : masteredWords.map(w => `<span class="mastered-tag" title="${w.meaning}">${w.word}</span>`).join('');
}

// ===================== NEXT SESSION =====================
function nextSession() {
  buildQueue();
  document.getElementById('congratsScreen').classList.remove('show');
  document.getElementById('actionBar').style.display = 'flex';
  renderCard();
}

// ===================== INIT =====================
initState();
renderCard();
updateStats();
</script>
